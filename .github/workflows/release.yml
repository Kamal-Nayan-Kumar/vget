name: Release CLI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release CLI
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: vget
            asset_name: vget-linux-amd64
          - os: macos-latest
            binary_name: vget
            asset_name: vget-macos-amd64
          - os: windows-latest
            binary_name: vget.exe
            asset_name: vget-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f cli/requirements.txt ]; then pip install -r cli/requirements.txt; fi
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pyinstaller typer

      - name: Build CLI Binary
        run: |
          pyinstaller --onefile cli/main.py --name vget

      - name: Rename Binary
        shell: bash
        run: |
          mv dist/${{ matrix.binary_name }} ./${{ matrix.asset_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
