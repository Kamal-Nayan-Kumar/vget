name: vget Security CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install -r cli/requirements.txt
        
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build

  build-binaries:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: vget-linux-amd64
            executable_name: vget
          - os: macos-latest
            asset_name: vget-macos-amd64
            executable_name: vget
          - os: windows-latest
            asset_name: vget-windows-amd64.exe
            executable_name: vget.exe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cli/requirements.txt
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: |
          pyinstaller --onefile --name vget --paths . cli/main.py

      - name: Rename binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv dist/vget dist/${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: move dist\vget.exe dist\${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: [build-and-test, build-binaries]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true
    
    - name: Display downloaded artifacts
      run: ls -la dist/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: |
          Auto-generated deployment release for the Data Security & Privacy capstone project.
          - Verified Zero-Trust Backend logic
          - Packaged AI Code Checker ML algorithms
          - Bundled Vercel-ready frontend
          - Cross-platform CLI binaries
        draft: false
        prerelease: false
        files: |
          dist/vget-linux-amd64
          dist/vget-macos-amd64
          dist/vget-windows-amd64.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
